    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev">&#8592;</button>
        <img id="lightbox-img" src="" alt="">
        <button class="lightbox-nav lightbox-next" id="lightbox-next">&#8594;</button>
    </div>

    <script>
        const imgs = Array.from(document.querySelectorAll('.gallery-item img'));
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        let current = 0;

        function open(index) {
            current = index;
            lbImg.src = imgs[current].src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function close() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function prev() { open((current - 1 + imgs.length) % imgs.length); }
        function next() { open((current + 1) % imgs.length); }

        imgs.forEach((img, i) => img.addEventListener('click', () => open(i)));
        document.getElementById('lightbox-prev').addEventListener('click', prev);
        document.getElementById('lightbox-next').addEventListener('click', next);
        document.getElementById('lightbox-close').addEventListener('click', close);
        lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });
        document.addEventListener('keydown', e => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'ArrowLeft') prev();
            if (e.key === 'ArrowRight') next();
            if (e.key === 'Escape') close();
        });
    </script>
