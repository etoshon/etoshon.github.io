    <section class="hero">
        <div class="hero-inner">
            <div class="sprite-wrap">
                <canvas id="sprite-canvas"></canvas>
            </div>
            <div class="hero-text">
                <h1>Eton's Shonanigans</h1>
                <p>Music &middot; Animation &middot; Photography &middot; Product</p>
            </div>
        </div>
    </section>

    <script>
        const srcs = ['images/frame_1.jpg', 'images/frame_2.jpg', 'images/frame_3.jpg'];
        const bitmaps = [];
        let loaded = 0;
        srcs.forEach((src, idx) => {
            const img = new Image();
            img.onload = () => {
                createImageBitmap(img).then(bmp => {
                    bitmaps[idx] = bmp;
                    if (++loaded === srcs.length) startLoop();
                });
            };
            img.src = src;
        });

        function startLoop() {
            const canvas = document.getElementById('sprite-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = bitmaps[0].width;
            canvas.height = bitmaps[0].height;
            const interval = 1000 / 12;
            let frame = 0, last = 0;
            function tick(ts) {
                if (ts - last >= interval) {
                    ctx.drawImage(bitmaps[frame], 0, 0);
                    frame = (frame + 1) % bitmaps.length;
                    last = ts;
                }
                requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        }
    </script>
</body>
