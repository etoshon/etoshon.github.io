<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eton's Shonanigans</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="music.html">Music</a></li>
            <li><a href="animation.html">Animation</a></li>
            <li><a href="photography.html">Photography</a></li>
            <li><a href="product.html">Projects</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-inner">
            <div class="sprite-wrap">
                <canvas id="about-canvas"></canvas>
            </div>
            <div class="hero-text">
                <h1><span class="first-e">E<canvas id="tomato-canvas"></canvas></span>ton's Shonanigans</h1>
                <p>Music &middot; Animation &middot; Photography &middot; Projects</p>
            </div>
            <canvas id="photo-canvas"></canvas>
            <canvas id="music-canvas"></canvas>
            <canvas id="product-canvas"></canvas>
        </div>
    </section>

    <script>
        function makeAnim(canvasId, sSrcs, pSrcs, displayHeight, clickUrl, stickyBoundary) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            const bitmaps = { s: new Array(sSrcs.length), p: new Array(pSrcs.length) };
            let totalLoaded = 0;
            const totalNeeded = sSrcs.length + pSrcs.length;
            let ready = false;
            let hovering = false;
            let rowBounds = null;

            function loadSrc(src, arr, idx) {
                const img = new Image();
                img.onload = () => {
                    createImageBitmap(img).then(bmp => {
                        arr[idx] = bmp;
                        if (++totalLoaded === totalNeeded) {
                            canvas.width = bitmaps.s[0].width;
                            canvas.height = bitmaps.s[0].height;
                            const aspect = canvas.width / canvas.height;
                            canvas.style.height = displayHeight + 'px';
                            canvas.style.width = Math.round(displayHeight * aspect) + 'px';
                            rowBounds = buildBoundary([...bitmaps.s, ...bitmaps.p]);
                            ready = true;
                            startLoop();
                        }
                    });
                };
                img.src = src;
            }

            function buildBoundary(allBmps) {
                const w = canvas.width, h = canvas.height;
                const tmp = document.createElement('canvas');
                tmp.width = w; tmp.height = h;
                const tc = tmp.getContext('2d');
                const left = new Int32Array(h).fill(w);
                const right = new Int32Array(h).fill(-1);
                for (const bmp of allBmps) {
                    tc.drawImage(bmp, 0, 0);
                    const data = tc.getImageData(0, 0, w, h).data;
                    for (let y = 0; y < h; y++) {
                        const row = y * w;
                        for (let x = 0; x < w; x++) {
                            const i = (row + x) * 4;
                            if ((255 - data[i]) + (255 - data[i+1]) + (255 - data[i+2]) > 20) {
                                if (x < left[y]) left[y] = x;
                                if (x > right[y]) right[y] = x;
                            }
                        }
                    }
                }
                let minX = w, maxX = -1, minY = h, maxY = -1;
                for (let y = 0; y < h; y++) {
                    if (right[y] >= left[y]) {
                        if (left[y] < minX) minX = left[y];
                        if (right[y] > maxX) maxX = right[y];
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
                return { left, right, minX, maxX, minY, maxY };
            }

            sSrcs.forEach((src, i) => loadSrc(src, bitmaps.s, i));
            pSrcs.forEach((src, i) => loadSrc(src, bitmaps.p, i));

            function startLoop() {
                const interval = 1000 / 12;
                let frame = 0, last = 0;
                function tick(ts) {
                    if (ts - last >= interval) {
                        const frames = hovering ? bitmaps.p : bitmaps.s;
                        ctx.drawImage(frames[frame % frames.length], 0, 0);
                        frame++;
                        last = ts;
                    }
                    requestAnimationFrame(tick);
                }
                requestAnimationFrame(tick);
            }

            function checkHover(e) {
                if (!ready) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = Math.floor((e.clientX - rect.left) * scaleX);
                const y = Math.floor((e.clientY - rect.top) * scaleY);
                if (x < 0 || y < 0 || x >= canvas.width || y >= canvas.height) {
                    hovering = false;
                    return;
                }
                if (stickyBoundary && rowBounds) {
                    hovering = x >= rowBounds.minX && x <= rowBounds.maxX &&
                        y >= rowBounds.minY && y <= rowBounds.maxY;
                    return;
                }
                const px = ctx.getImageData(x, y, 1, 1).data;
                const onDrawn = (255 - px[0]) + (255 - px[1]) + (255 - px[2]) > 20;
                const insideBoundary = rowBounds && x >= rowBounds.left[y] && x <= rowBounds.right[y];
                hovering = onDrawn || insideBoundary;
            }

            if (stickyBoundary) {
                // Overlapping sibling canvases can sit on top of this one within its own
                // box, causing spurious mouseleave/mousemove churn on this element as the
                // cursor passes under them. Track from document so hover state depends
                // only on cursor position, not which element is topmost at that point.
                document.addEventListener('mousemove', e => {
                    checkHover(e);
                    canvas.style.cursor = hovering ? 'pointer' : 'default';
                });
            } else {
                canvas.addEventListener('mousemove', e => {
                    checkHover(e);
                    canvas.style.cursor = hovering ? 'pointer' : 'default';
                });
                canvas.addEventListener('mouseleave', () => {
                    hovering = false;
                    canvas.style.cursor = 'default';
                });
            }
            canvas.addEventListener('click', () => {
                if (hovering && clickUrl) window.location.href = clickUrl;
            });
        }

        makeAnim(
            'about-canvas',
            ['images/about/about_1_s.jpg', 'images/about/about_2_s.jpg', 'images/about/about_3_s.jpg'],
            ['images/about/about_1_p.jpg', 'images/about/about_2_p.jpg', 'images/about/about_3_p.jpg'],
            520,
            'about.html',
            true
        );

        makeAnim(
            'photo-canvas',
            ['images/photo/port_1_s.jpg', 'images/photo/port_2_s.jpg', 'images/photo/port_3_s.jpg'],
            ['images/photo/port_1_p.jpg', 'images/photo/port_2_p.jpg', 'images/photo/port_3_p.jpg',
             'images/photo/port_4_p.jpg', 'images/photo/port_5_p.jpg', 'images/photo/port_6_p.jpg'],
            330,
            'photography.html'
        );

        makeAnim(
            'product-canvas',
            ['images/product/frame_1_s.jpg', 'images/product/frame_2_s.jpg', 'images/product/frame_3_s.jpg'],
            ['images/product/frame_1_p.jpg', 'images/product/frame_2_p.jpg', 'images/product/frame_3_p.jpg'],
            330,
            'product.html'
        );

        makeAnim(
            'music-canvas',
            ['images/music/port_1_s.jpg', 'images/music/port_2_s.jpg', 'images/music/port_3_s.jpg'],
            ['images/music/port_1_p.jpg', 'images/music/port_2_p.jpg', 'images/music/port_3_p.jpg',
             'images/music/port_4_p.jpg', 'images/music/port_5_p.jpg', 'images/music/port_6_p.jpg'],
            360,
            'music.html'
        );

        makeAnim(
            'tomato-canvas',
            ['images/tomato/tomato_1_s.jpg', 'images/tomato/tomato_2_s.jpg', 'images/tomato/tomato_3_s.jpg'],
            ['images/tomato/frame_1.jpg', 'images/tomato/frame_2.jpg', 'images/tomato/frame_3.jpg'],
            440,
            'animation.html'
        );
    </script>
</body>
</html>
